<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-left">
                <h1>SPORT<span>TRACKER</span></h1>
                <p class="subtitle">Live Sensor Telemetry</p>
            </div>
            <div class="header-right">
                <div class="status-indicator">
                    <span class="dot disconnected" id="connection-dot"></span>
                    <span id="connection-status">Disconnected</span>
                </div>
                <button id="connect-btn" class="connect-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 7 10 10"/><path d="M17 7 7 17"/></svg>
                    Connect Device
                </button>
            </div>
        </header>



        <div class="processed-section">
            <h2 class="processed-section-title">PROCESSED DATA</h2>
            <div class="processed-grid">
                <!-- Steps Card -->
                <div class="glass-card metric-card">
                    <div class="card-header">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="5" r="2" />
                            <path d="M12 7v6" />
                            <path d="M12 13l3 4v4" />
                            <path d="M12 13l-3 4l-2 4" />
                            <path d="M12 9l-3 4" />
                            <path d="M12 9l3 4" />
                        </svg>
                        <h2>Steps Taken</h2>
                    </div>
                    <div class="card-body">
                        <div class="value-display">
                            <span id="steps-val" class="value text-gradient">0</span>
                            <span class="unit">steps</span>
                        </div>
                    </div>
                </div>

                <!-- Pushups Card -->
                <div class="glass-card metric-card">
                    <div class="card-header">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 20h20" />
                            <circle cx="18" cy="11" r="2" />
                            <path d="M16 12l-6 3l-6 3" />
                            <path d="M14 13v7" />
                            <path d="M4 18v2" />
                        </svg>
                        <h2>Push-ups</h2>
                    </div>
                    <div class="card-body">
                        <div class="value-display">
                            <span id="pushups-val" class="value text-gradient-alt">0</span>
                            <span class="unit">reps</span>
                        </div>
                    </div>
                </div>

                <!-- Posture Card -->
                <div class="glass-card metric-card posture-card">
                    <div class="card-header" style="justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 0.8rem;">
                            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="6" r="2" />
                                <path d="M12 8v6" />
                                <path d="M12 14h4v6" />
                                <path d="M12 10l3 2v2" />
                                <path d="M9 14h3" />
                                <path d="M9 20v-6l-1-6" />
                            </svg>
                            <h2>Posture (Lean/Tilt)</h2>
                        </div>
                        <span id="posture-status-badge" style="padding: 0.3rem 0.8rem; border-radius: 12px; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); transition: all 0.3s ease;">GOOD</span>
                    </div>
                    <div class="card-body posture-body">
                        <div class="posture-item">
                            <span class="posture-label">Lean</span>
                            <div class="value-display small">
                                <span id="pitch-val" class="value">0.0</span>
                                <span class="unit">°</span>
                            </div>
                            <span id="lean-dir" style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-top: -0.5rem; letter-spacing: 1px;">Centered</span>
                        </div>
                        <div class="divider"></div>
                        <div class="posture-item">
                            <span class="posture-label">Tilt</span>
                            <div class="value-display small">
                                <span id="roll-val" class="value">0.0</span>
                                <span class="unit">°</span>
                            </div>
                            <span id="tilt-dir" style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-top: -0.5rem; letter-spacing: 1px;">Centered</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="processed-section-title" style="margin-top: 3rem;">RAW DATA</h2>
        <main class="dashboard-grid">
            <!-- Terminal 1: IMU (GY-85) -->
            <div class="terminal-card">
                <div class="terminal-header">
                    <div class="window-controls">
                        <span class="control close"></span>
                        <span class="control minimize"></span>
                        <span class="control maximize"></span>
                    </div>
                    <h2 class="terminal-title">GY-85 IMU</h2>
                    <span class="data-counter" id="imu-counter">0</span>
                </div>
                <div class="terminal-body" id="imu-log">
                    <div class="log-entry system">Initializing GY-85 Module...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
